name: Candle-Logic-Monitor

on:
  schedule:
    # 平日(月-金)の日本時間 16:05 〜 翌01:05 まで毎時5分に実行
    - cron: '5 7-16 * * 1-5'
  workflow_dispatch:

jobs:
  run-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Libs
        run: pip install yfinance pandas pandas_ta
      - name: Run Python
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python candle_logic.py
