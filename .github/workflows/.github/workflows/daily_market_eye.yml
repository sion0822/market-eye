name: Daily-Market-Eye  # 前のプログラム用の名前

on:
  schedule:
    # 日本時間 12:00 と 00:00 (1日2回) 実行
    - cron: '0 3,15 * * *'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Libs
        run: pip install yfinance pandas pandas_ta
      - name: Run Python
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python main.py  # 前のプログラムのファイル名がmain.pyの場合
